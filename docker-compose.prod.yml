services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  server:
    build:
      context: ./server
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - PORT=8000
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - app-network

  worker:
    build:
      context: ./server
    command: ["node", "worker.js"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - app-network

  client:
    build:
      context: ./client
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - app-network

  web:
    image: nginx:stable-alpine
    depends_on:
      - client
      - server
    ports:
      - '80:80'
      - '443:443'
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    networks:
      - app-network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    networks:
      - app-network

volumes:
  qdrant_data:
  redis_data:

networks:
  app-network:
    driver: bridge
