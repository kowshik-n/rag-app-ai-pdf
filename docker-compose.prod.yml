version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  server:
    build:
      context: ./server
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - PORT=8000
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./server/uploads:/app/uploads

  worker:
    build:
      context: ./server
    command: ["node", "worker.js"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
    depends_on:
      - server

  web:
    image: nginx:stable-alpine
    depends_on:
      - client
      - server
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
